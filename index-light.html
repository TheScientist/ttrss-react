<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8">
    <!-- Favicon -->
    <link rel="icon" href="./favicon.ico">
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    
    <!-- Manifest for light mode -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    
    <!-- iOS PWA -->
    <link rel="apple-touch-icon" href="/apple-icon-180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- Android splash screen: Uses icon + background_color from manifest -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
      html, body, #root { height: 100%; margin: 0; background: #ffffff; }
    </style>
    <script>
      // Set light theme immediately to avoid flash
      (function() {
        window.__THEME_MODE__ = 'light';
        document.documentElement.style.background = '#ffffff';
        document.body.style.background = '#ffffff';
        document.documentElement.style.colorScheme = 'light';
      })();
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <title>Tiny Tiny RSS React</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
